<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Área Reservada | Duminius</title>
<meta name="description" content="Área reservada da Duminius. Acesso para formandos, formadores e administração." />
<meta name="robots" content="noindex" />
<meta name="theme-color" content="#0b1b3b" />
<link rel="icon" href="assets/img/favicon.png" />
<link rel="apple-touch-icon" href="assets/img/apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" />
<link rel="stylesheet" href="assets/css/styles.css" />
<style>
  .auth-wrap { min-height:100vh; display:grid; place-items:center; padding:40px 20px; position:relative; overflow:hidden; }
  .auth-bg { position:absolute; inset:0; background:var(--ink); z-index:0; }
  .auth-bg::after { content:""; position:absolute; inset:0; background-image:radial-gradient(circle at 1px 1px, rgba(255,255,255,.06) 1px, transparent 0); background-size:32px 32px; }
  .auth-glow { position:absolute; width:520px; height:520px; border-radius:50%; filter:blur(120px); opacity:.35; z-index:0; }
  .auth-glow.a { background:#2563eb; top:-160px; left:-120px; }
  .auth-glow.b { background:#22c79e; bottom:-180px; right:-120px; }
  .auth-card { position:relative; z-index:1; width:100%; max-width:440px; background:#fff; border-radius:var(--r-xl); box-shadow:var(--shadow-lg); padding:clamp(28px,4vw,42px); }
  .auth-card .brand { justify-content:center; margin-bottom:8px; }
  .auth-sub { text-align:center; color:var(--muted); font-size:.95rem; margin-bottom:26px; }
  .role-tabs { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; background:var(--bg); padding:6px; border-radius:14px; margin-bottom:24px; }
  .role-tabs button { padding:10px 6px; border-radius:10px; font-weight:700; font-size:.85rem; color:var(--ink-soft); transition:.25s; display:flex; flex-direction:column; align-items:center; gap:5px; }
  .role-tabs button svg { width:20px; height:20px; }
  .role-tabs button.on { background:#fff; color:var(--blue); box-shadow:var(--shadow-sm); }
  .auth-note { text-align:center; font-size:.82rem; color:var(--muted); margin-top:18px; }
  .back { position:absolute; top:24px; left:24px; z-index:2; color:#fff; font-weight:600; font-size:.9rem; display:inline-flex; align-items:center; gap:8px; opacity:.85; }
  .back:hover { opacity:1; }
  .back svg { width:18px; height:18px; }
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-bg"></div>
  <div class="auth-glow a"></div>
  <div class="auth-glow b"></div>
  <a href="index.html" class="back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 18l-6-6 6-6"/></svg> Voltar ao site</a>

  <div class="auth-card">
    <a href="index.html" class="brand" aria-label="Duminius">
      <svg class="mark" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs><linearGradient id="dg" x1="4" y1="4" x2="44" y2="44" gradientUnits="userSpaceOnUse"><stop stop-color="#2563eb"/><stop offset="1" stop-color="#22c79e"/></linearGradient></defs>
        <g stroke="url(#dg)" stroke-width="3.6" fill="none"><rect x="9" y="9" width="30" height="30" rx="10" transform="rotate(45 24 24)"/></g>
        <rect x="18" y="18" width="12" height="12" rx="4" fill="url(#dg)"/>
      </svg>
      duminius
    </a>
    <p class="auth-sub">Área reservada · acede aos teus conteúdos</p>

    <div class="role-tabs" role="tablist">
      <button class="on" data-role="Formando">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10 12 5 2 10l10 5 10-5z"/><path d="M6 12v5c3 2 9 2 12 0v-5"/></svg>
        Formando
      </button>
      <button data-role="Formador">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        Formador
      </button>
      <button data-role="Administração">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Admin
      </button>
    </div>

    <form data-form>
      <div class="field"><label for="user">Email · <span data-role-label>Formando</span></label><input id="user" name="user" type="email" placeholder="o.teu@email.com" required /></div>
      <div class="field"><label for="pass">Palavra-passe</label><input id="pass" name="pass" type="password" placeholder="••••••••" required /></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;font-size:.88rem">
        <label style="display:flex;gap:8px;align-items:center;font-weight:500;color:var(--ink-soft)"><input type="checkbox" style="width:auto" /> Lembrar-me</label>
        <a href="#" style="color:var(--blue);font-weight:600">Esqueci-me</a>
      </div>
      <button type="submit" class="btn btn-primary btn-lg btn-block">Entrar</button>
      <p class="form-success" hidden style="margin-top:16px;text-align:center;color:var(--green-deep);font-weight:700">✔ Área reservada em preparação. A plataforma de conteúdos será ativada em breve.</p>
    </form>

    <p class="auth-note">Ainda não tens acesso? <a href="inscricoes.html" style="color:var(--blue);font-weight:600">Inscreve-te</a> ou fala connosco.</p>
  </div>
</div>

<script src="assets/js/main.js"></script>
<script>
  (function(){
    var tabs = document.querySelectorAll('.role-tabs button');
    var label = document.querySelector('[data-role-label]');
    tabs.forEach(function(t){ t.addEventListener('click', function(){
      tabs.forEach(function(x){ x.classList.remove('on'); });
      t.classList.add('on');
      if (label) label.textContent = t.dataset.role;
    }); });
  })();
</script>
</body>
</html>
